{cat:"Object Slicing", type:"UB?", q:"Any issue with this cast?", code:"class Base { public: virtual ~Base() = default; };\nclass Derived : public Base { public: int extra = 5; };\nint main() {\n    Base b;  // a plain Base object, NOT a Derived\n    Derived* d = static_cast<Derived*>(&b);  // downcast a genuine Base\n    cout << d->extra;  // access Derived-only member", options:["Prints 5, works fine", "Undefined behavior — b is not ACTUALLY a Derived object; accessing d->extra reads memory that doesn't correspond to a real Derived instance", "Compile error", "Prints 0 safely"], correct:1, exp:"static_cast performs no runtime check — it lets you force the cast even though 'b' is genuinely just a Base, not a Derived. Accessing d->extra reads memory beyond what a plain Base object actually has, which is undefined behavior (this is exactly why dynamic_cast, which WOULD safely fail here on a reference, or return nullptr on a pointer downcast from a genuinely-Base object — though note dynamic_cast on an object that's ACTUALLY just Base, not merely accessed via a Base* pointing to a real Derived, also has defined failure behavior — is preferred when you're not certain of the actual type)."},
// ===== General Misc Gotchas =====
{cat:"General Gotchas", type:"Output", q:"What does this print?", code:"class A {\npublic:\n    A(int x) { cout << \"A(int) \"; }\n    A(const A& other) { cout << \"A(copy) \"; }\n};\nvoid f(A a) { }  // by value\nint main() {\n    A obj(5);\n    f(obj);  // pass by value: lvalue -> copy\n    f(A(10));  // pass a temporary -- may be elided\n}", options:["A(int) A(copy) A(int) A(copy)", "A(int) A(copy) A(int)", "A(int) A(int) A(copy)", "A(int) A(copy)"], correct:1, exp:"A obj(5) prints 'A(int)'. f(obj): obj is an lvalue, so passing by value copies it: 'A(copy)'. f(A(10)): A(10) is a temporary (prvalue); constructing it prints 'A(int)', and passing that PRVALUE directly into a by-value parameter of the SAME type is subject to mandatory copy elision (C++17+) — no additional copy constructor call. Total: 'A(int) A(copy) A(int)'."},
{cat:"General Gotchas", type:"Bug", q:"What's wrong with this class design?", code:"class Singleton {\npublic:\n    Singleton() {}  // public constructor, not actually preventing multiple instances\n    static Singleton& getInstance() {\n        static Singleton instance;\n        return instance;\n    }\n};\nint main() {\n    Singleton& s1 = Singleton::getInstance();\n    Singleton s2;  // oops, created a second instance directly\n}", options:["No issue, this is a correct Singleton", "The constructor is public, so nothing stops code from bypassing getInstance() and constructing additional instances directly, defeating the Singleton pattern's intent", "Compile error on the static local", "Undefined behavior"], correct:1, exp:"A proper Singleton needs a PRIVATE (or otherwise restricted) constructor to actually enforce single-instance-ness — as written, `Singleton s2;` compiles fine and creates a second, independent instance, completely bypassing the intended pattern."},
{cat:"General Gotchas", type:"Output", q:"What does this print?", code:"class Base {\npublic:\n    Base() { print(); }\n    virtual void print() { cout << \"Base::print \"; }\n};\nclass Derived : public Base {\n    int value = 5;\npublic:\n    void print() override { cout << \"Derived::print(\" << value << \") \"; }\n};\nint main() { Derived d; }", options:["Derived::print(5)", "Base::print", "Derived::print(0)", "Compile error"], correct:1, exp:"Calling a virtual function from the BASE's constructor doesn't dispatch to Derived's override — at that point, Derived's part (including 'value') hasn't been constructed yet, so the object is treated as 'just a Base' for virtual dispatch purposes. Prints 'Base::print' (NOT Derived::print, and NOT even Derived::print(0), since Derived::print is never called at all here)."},
{cat:"General Gotchas", type:"Bug", q:"What's wrong with this code?", code:"class Base {\npublic:\n    Base(int x) { cout << x; }\n};\nclass Derived : public Base {\npublic:\n    Derived() { }  // uses Base's default constructor implicitly -- but there isn't one!\n};", options:["Compiles fine, calls Base(0) implicitly", "Compile error — Base has no default constructor, and Derived doesn't explicitly call Base(int)", "Undefined behavior", "Runtime error"], correct:1, exp:"Since Base ONLY has Base(int) (no default constructor), and Derived's constructor doesn't specify which Base constructor to call, the compiler tries to implicitly call a Base default constructor that doesn't exist — compile error."},
{cat:"General Gotchas", type:"Output", q:"What does this print?", code:"class Animal {\npublic:\n    virtual std::string sound() const = 0;\n    void makeSound() const { cout << sound(); }  // non-virtual, calls virtual internally\n};\nclass Cat : public Animal {\npublic:\n    std::string sound() const override { return \"Meow\"; }\n};\nint main() {\n    Cat c;\n    Animal& a = c;\n    a.makeSound();\n}", options:["Meow", "Compile error, sound() is pure virtual", "Undefined behavior", "Prints nothing"], correct:0, exp:"makeSound() is a regular (non-virtual) function, but internally calls the VIRTUAL sound() — since 'a' actually refers to a fully-constructed Cat, this correctly dispatches to Cat::sound(), printing 'Meow'. (Contrast with the earlier trap where virtual calls FROM WITHIN A CONSTRUCTOR don't behave this way — this is a normal member function call after construction is complete, so full polymorphism applies.)"},
{cat:"General Gotchas", type:"Bug", q:"What's the subtle issue in this comparison operator?", code:"class Money {\n    double amount;\npublic:\n    Money(double a) : amount(a) {}\n    bool operator==(const Money& other) const {\n        return amount == other.amount;  // exact floating-point comparison\n    }\n};\nint main() {\n    Money a(0.1 + 0.2);\n    Money b(0.3);\n    cout << (a == b);\n}", options:["1 (true), they're mathematically equal", "0 (false) — floating point rounding error means 0.1+0.2 isn't exactly bit-equal to 0.3", "Compile error", "Undefined behavior"], correct:1, exp:"Due to floating-point representation error, 0.1 + 0.2 does NOT produce EXACTLY 0.3 in IEEE 754 double precision — the direct == comparison returns false. A robust operator== should compare within a small epsilon tolerance instead of exact equality for floating-point members."},
{cat:"General Gotchas", type:"Output", q:"What does this print?", code:"class Base {\npublic:\n    virtual ~Base() { cout << \"~Base \"; }\n};\nclass Derived : public Base {\npublic:\n    ~Derived() { cout << \"~Derived \"; }\n};\nint main() {\n    Base* b = new Derived();\n    delete b;\n}", options:["~Base", "~Derived ~Base", "~Base ~Derived", "Undefined behavior"], correct:1, exp:"Base's destructor IS virtual here, so `delete b` correctly dispatches to ~Derived() first (most-derived first), which then automatically also invokes ~Base() as part of normal destructor chaining. Output: '~Derived ~Base'."},
];

let current = 0;
let selected = new Array(QUESTIONS.length).fill(null);
let activeCat = "All";

function categories() {
  const set = new Set(QUESTIONS.map(q => q.cat));
  return ["All", ...set];
}

function filteredIndices() {
  if (activeCat === "All") return QUESTIONS.map((_, i) => i);
  return QUESTIONS.map((_, i) => i).filter(i => QUESTIONS[i].cat === activeCat);
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderFilters() {
  return `<div class="filter-row">` + categories().map(c =>
    `<button class="filter-chip ${c===activeCat?'active':''}" onclick="setCat('${c.replace(/'/g,"\\'")}')">${c}</button>`
  ).join('') + `</div>`;
}

window.setCat = function(c) {
  activeCat = c;
  current = 0;
  render();
};

window.selectOption = function(qIdx, optIdx) {
  if (selected[qIdx] !== null) return;
  selected[qIdx] = optIdx;
  render();
};

window.nextQ = function() {
  const idxs = filteredIndices();
  const pos = idxs.indexOf(current);
  if (pos < idxs.length - 1) current = idxs[pos + 1];
  render();
};

window.prevQ = function() {
  const idxs = filteredIndices();
  const pos = idxs.indexOf(current);
  if (pos > 0) current = idxs[pos - 1];
  render();
};

window.restartQuiz = function() {
  selected = new Array(QUESTIONS.length).fill(null);
  current = 0;
  activeCat = "All";
  render();
};

window.showSummary = function() {
  current = -1;
  render();
};

function scoreFor(idxs) {
  let correct = 0, answered = 0;
  idxs.forEach(i => {
    if (selected[i] !== null) {
      answered++;
      if (selected[i] === QUESTIONS[i].correct) correct++;
    }
  });
  return { correct, answered, total: idxs.length };
}

function render() {
  const root = document.getElementById('quizRoot');
  const idxs = filteredIndices();

  if (current === -1) {
    const overall = scoreFor(QUESTIONS.map((_, i) => i));
    const cats = categories().filter(c => c !== "All");
    const rows = cats.map(c => {
      const catIdxs = QUESTIONS.map((_, i) => i).filter(i => QUESTIONS[i].cat === c);
      const s = scoreFor(catIdxs);
      return `<div class="cat-row"><span>${c}</span><span>${s.correct} / ${s.total}</span></div>`;
    }).join('');
    root.innerHTML = `
      <div class="quiz-header"><div class="quiz-title">Results</div></div>
      <div class="summary">
        <div class="big">${overall.correct} / ${overall.total}</div>
        <div class="sub">${overall.answered} of ${overall.total} questions answered</div>
        <div class="cat-breakdown">${rows}</div>
        <button class="nav-btn restart-btn" onclick="restartQuiz()">Restart Quiz</button>
      </div>`;
    return;
  }

  const q = QUESTIONS[current];
  const pos = idxs.indexOf(current);
  const pct = Math.round(((pos + 1) / idxs.length) * 100);
  const isAnswered = selected[current] !== null;
  const overall = scoreFor(QUESTIONS.map((_, i) => i));

  const optsHtml = q.options.map((opt, i) => {
    let cls = 'opt-btn';
    if (isAnswered) {
      if (i === q.correct) cls += ' correct';
      else if (i === selected[current]) cls += ' wrong';
    }
    return `<button class="${cls}" ${isAnswered ? 'disabled' : ''} onclick="selectOption(${current}, ${i})">${escapeHtml(opt)}</button>`;
  }).join('');

  root.innerHTML = `
    <div class="quiz-header">
      <div class="quiz-title">C++ OOP Code-Analysis Quiz</div>
      <span class="score-pill">Score so far: ${overall.correct}/${overall.answered || 0} answered · ${overall.total} total</span>
    </div>
    ${renderFilters()}
    <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    <div class="q-card">
      <span class="cat-tag">${q.cat}</span><span class="type-tag">${q.type}</span>
      <div class="q-text">${pos + 1}. ${escapeHtml(q.q)}</div>
      ${q.code ? `<code class="q-code">${escapeHtml(q.code)}</code>` : ''}
      ${optsHtml}
      ${isAnswered ? `<div class="explain">${selected[current] === q.correct ? '✅ Correct. ' : '❌ Not quite. '}${escapeHtml(q.exp)}</div>` : ''}
    </div>
    <div class="nav-row">
      <button class="nav-btn secondary" onclick="prevQ()" ${pos === 0 ? 'disabled' : ''}>← Prev</button>
      <button class="nav-btn secondary" onclick="showSummary()">View Summary</button>
      <button class="nav-btn" onclick="nextQ()" ${pos === idxs.length - 1 ? 'disabled' : ''}>Next →</button>
    </div>`;
}

render();
</script>
