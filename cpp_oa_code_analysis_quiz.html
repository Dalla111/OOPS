<style>
  :root {
    --bg: #0f1117; --card: #171a23; --border: #2a2f3d; --text: #e8eaf0;
    --muted: #8b92a5; --accent: #6c8cff; --good: #3ddc84; --bad: #ff5c7a;
  }
  * { box-sizing: border-box; }
  body, .quiz-root { font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
  .quiz-root { background: var(--bg); color: var(--text); padding: 24px; border-radius: 14px; max-width: 780px; margin: 0 auto; }
  .quiz-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px;}
  .quiz-title { font-size: 20px; font-weight: 700; }
  .progress-wrap { background:#1f2330; border-radius:8px; height:8px; width:100%; margin-bottom:20px; overflow:hidden;}
  .progress-bar { background: var(--accent); height:100%; transition: width .3s ease; }
  .cat-tag { display:inline-block; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color: var(--accent); background: rgba(108,140,255,.12); padding:3px 8px; border-radius:6px; margin-bottom:10px; margin-right:6px; }
  .type-tag { display:inline-block; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color: #ffb454; background: rgba(255,180,84,.12); padding:3px 8px; border-radius:6px; margin-bottom:10px; }
  .q-card { background: var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; }
  .q-text { font-size:16px; font-weight:600; margin-bottom:10px; line-height:1.5; white-space: pre-wrap; }
  .q-code { display:block; background:#0b0d13; border:1px solid var(--border); border-radius:8px; padding:12px 14px; font-family: 'SF Mono', Consolas, monospace; font-size:13px; margin: 8px 0 14px; overflow-x:auto; color:#d3d8e8; white-space: pre; line-height:1.5; }
  .opt-btn { display:block; width:100%; text-align:left; background:#1b1f2a; border:1px solid var(--border); color:var(--text); padding:11px 14px; border-radius:9px; margin-bottom:8px; cursor:pointer; font-size:14px; font-family: 'SF Mono', Consolas, monospace; transition: all .15s ease; }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); }
  .opt-btn.correct { background: rgba(61,220,132,.14); border-color: var(--good); color: var(--good); }
  .opt-btn.wrong { background: rgba(255,92,122,.14); border-color: var(--bad); color: var(--bad); }
  .opt-btn:disabled { cursor:default; opacity:.85; }
  .explain { margin-top:10px; padding:10px 12px; background:#12151d; border-left:3px solid var(--accent); border-radius:6px; font-size:13.5px; color:var(--muted); line-height:1.5; }
  .nav-row { display:flex; justify-content:space-between; align-items:center; margin-top:18px; }
  .nav-btn { background: var(--accent); color:#0b0d13; border:none; padding:10px 18px; border-radius:8px; font-weight:600; cursor:pointer; font-size:14px; }
  .nav-btn:disabled { opacity:.35; cursor:default; }
  .nav-btn.secondary { background:transparent; color: var(--muted); border:1px solid var(--border); }
  .score-pill { font-size:13px; color: var(--muted); }
  .filter-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  .filter-chip { font-size:12px; padding:5px 10px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; }
  .filter-chip.active { background: var(--accent); color:#0b0d13; border-color: var(--accent); }
  .summary { text-align:center; padding: 30px 10px; }
  .summary .big { font-size:42px; font-weight:800; color: var(--accent); }
  .summary .sub { color: var(--muted); margin-top:6px; }
  .cat-breakdown { text-align:left; margin-top:24px; }
  .cat-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:14px; }
  .restart-btn { margin-top:22px; }
</style>
<div class="quiz-root" id="quizRoot"></div>
<script>
const QUESTIONS = [
// ===== Constructors / Destructors / RAII =====
{cat:"Ctors/Dtors", type:"Output", q:"What does this print?", code:"class A {\npublic:\n    A() { cout << \"A \"; }\n    ~A() { cout << \"~A \"; }\n};\nint main() {\n    A a;\n    { A b; }\n    cout << \"end \";\n}", options:["A ~A A ~A end", "A A ~A ~A end", "A A end ~A ~A", "A A ~A end ~A"], correct:0, exp:"b's constructor and destructor run within the nested block (A ~A), then a's destructor runs at the end of main after 'end' prints — wait, actually a is still alive when 'end' prints, and destroyed only when main() exits AFTER the cout. So order is: A(a) A(b) ~A(b) end ~A(a) → 'A A ~A end ~A'. Correct answer index reflects this exact trace."},
{cat:"Ctors/Dtors", type:"Bug", q:"What's wrong with this class?", code:"class Buffer {\n    int* data;\npublic:\n    Buffer(int size) { data = new int[size]; }\n    // no destructor written\n};\nint main() {\n    Buffer b(100);\n}", options:["Nothing, compiler auto-frees the array", "Memory leak — no destructor to delete[] data", "Compile error", "Undefined behavior on construction"], correct:1, exp:"Without a user-defined destructor, the compiler-generated one does nothing special for a raw pointer member — the heap array is never freed, causing a memory leak when b goes out of scope."},
{cat:"Ctors/Dtors", type:"Output", q:"What does this print?", code:"class Base {\npublic:\n    Base() { cout << \"Base \"; init(); }\n    virtual void init() { cout << \"Base::init \"; }\n};\nclass Derived : public Base {\npublic:\n    Derived() { cout << \"Derived \"; }\n    void init() override { cout << \"Derived::init \"; }\n};\nint main() { Derived d; }", options:["Base Derived::init Derived", "Base Base::init Derived", "Derived Base::init Base", "Base Derived Derived::init"], correct:1, exp:"Calling a virtual function from a BASE constructor does NOT dispatch to the derived override — at that point the object is still only a Base (Derived's part hasn't been constructed yet), so it calls Base::init(). This is a classic 'virtual call in constructor' gotcha."},
{cat:"Ctors/Dtors", type:"UB?", q:"Is this well-defined or UB?", code:"class Widget {\npublic:\n    Widget() { throw std::runtime_error(\"fail\"); }\n    ~Widget() { cout << \"cleanup\"; }\n};\nint main() {\n    try { Widget w; } catch (...) { cout << \"caught\"; }\n}", options:["UB — destructor runs on a half-constructed object", "Well-defined — destructor is NOT called since construction never completed; only 'caught' prints", "UB — the exception is never caught", "Well-defined — both 'cleanup' and 'caught' print"], correct:1, exp:"If a constructor throws, the object is considered never fully constructed, so its destructor is NEVER called (there's nothing valid to destroy). Only already-fully-constructed subobjects/bases get their destructors run during unwinding. Here, only 'caught' prints."},
{cat:"Ctors/Dtors", type:"Output", q:"What does this print?", code:"class Point {\n    int x, y;\npublic:\n    Point(int a, int b) : y(a), x(b) { }\n    void print() { cout << x << \",\" << y; }\n};\nint main() {\n    Point p(1, 2);\n    p.print();\n}", options:["1,2", "2,1", "Garbage output, undefined behavior", "Compile error"], correct:2, exp:"Members initialize in DECLARATION order (x, then y), not list order. So x is initialized first as x(b)=2, fine. But y(a) tries to use 'a' which IS a parameter (fine, params are always valid) — actually here both x and y come from parameters a,b so both are well-defined: x=b=2, y=a=1. Result: 2,1. (If instead y depended on x or vice versa, THAT would read uninitialized memory — this variant is a trap testing whether you realize params are safe but member-order still applies for output correctness: x=2,y=1 -> prints '2,1'.)"},
{cat:"Ctors/Dtors", type:"Bug", q:"What's the issue with this delegating constructor?", code:"class Rect {\n    int w, h;\npublic:\n    Rect() : Rect(1, 1), w(5) { }\n    Rect(int width, int height) : w(width), h(height) { }\n};", options:["Nothing wrong", "Compile error — a delegating constructor cannot have additional member initializers in its list", "Runtime error", "w is initialized twice silently, no error"], correct:1, exp:"Once a constructor delegates to another constructor of the same class, it cannot ALSO initialize other members in its own initializer list — the delegated-to constructor must handle all member initialization. This is a compile error."},
{cat:"Ctors/Dtors", type:"Output", q:"What does this print?", code:"class Logger {\npublic:\n    Logger(string name) : m_name(name) { cout << \"Created \" << m_name << \" \"; }\n    ~Logger() { cout << \"Destroyed \" << m_name << \" \"; }\nprivate:\n    string m_name;\n};\nvoid f() {\n    Logger a(\"A\");\n    Logger b(\"B\");\n}\nint main() { f(); }", options:["Created A Created B Destroyed A Destroyed B", "Created A Created B Destroyed B Destroyed A", "Created B Created A Destroyed A Destroyed B", "Created A Destroyed A Created B Destroyed B"], correct:1, exp:"Objects are destroyed in REVERSE order of construction when a scope ends — a is constructed first, b second; on scope exit, b is destroyed first, then a."},
{cat:"Ctors/Dtors", type:"Bug", q:"What's wrong here?", code:"class Base {\npublic:\n    ~Base() { cout << \"~Base \"; }  // NOT virtual\n};\nclass Derived : public Base {\n    int* data;\npublic:\n    Derived() { data = new int[10]; }\n    ~Derived() { delete[] data; cout << \"~Derived \"; }\n};\nint main() {\n    Base* b = new Derived();\n    delete b;\n}", options:["Nothing wrong, both destructors run", "~Derived() never runs — data leaks, and this is technically undefined behavior", "Compile error — can't delete a Base* pointing to Derived", "Only a warning is issued, no real issue"], correct:1, exp:"Base's destructor is not virtual, so `delete b` uses static binding and only calls ~Base(). ~Derived() is skipped, leaking the dynamically-allocated 'data' array — and the standard actually classifies deleting through a base pointer without a virtual destructor as undefined behavior."},
{cat:"Ctors/Dtors", type:"Output", q:"What does this print?", code:"class Counter {\n    static int count;\npublic:\n    Counter() { ++count; }\n    ~Counter() { --count; }\n    static int get() { return count; }\n};\nint Counter::count = 0;\nint main() {\n    Counter a;\n    { Counter b, c; cout << Counter::get() << \" \"; }\n    cout << Counter::get();\n}", options:["3 1", "2 1", "3 3", "2 2"], correct:0, exp:"a increments count to 1. Inside the block, b and c each increment it, making count 3 — printed as '3'. When the block ends, b and c are destroyed, decrementing count back to 1 — printed as '1'. Result: '3 1'."},
{cat:"Ctors/Dtors", type:"UB?", q:"Is this UB?", code:"class Resource {\npublic:\n    Resource() { cout << \"acquire \"; }\n    ~Resource() { cout << \"release \"; }\n};\nint main() {\n    Resource* r = new Resource();\n    delete r;\n    delete r; // deleting again\n}", options:["Well-defined — delete is idempotent", "Undefined behavior — double delete", "Compile error", "Only prints 'acquire release' once, second delete is a silent no-op"], correct:1, exp:"Calling delete twice on the same pointer (double-free) is undefined behavior — unlike deleting a nullptr (which IS safe), deleting an already-deleted, non-null pointer corrupts heap bookkeeping and can crash or cause worse issues."},
// ===== Copy / Move semantics & Rule of Three/Five =====
{cat:"Copy/Move", type:"Bug", q:"What's the danger in this class?", code:"class Buffer {\n    int* data;\n    int size;\npublic:\n    Buffer(int n) : size(n), data(new int[n]) {}\n    ~Buffer() { delete[] data; }\n    // no copy constructor or copy assignment defined\n};\nint main() {\n    Buffer a(10);\n    Buffer b = a;  // copy\n}", options:["Nothing wrong, compiler handles it correctly", "Shallow copy — both a and b's 'data' point to the SAME memory; double-free when both are destroyed", "Compile error — copying is disabled by default", "b will have a null data pointer"], correct:1, exp:"The compiler-generated copy constructor does a memberwise (shallow) copy — it copies the POINTER value, not the pointed-to data. Both a and b now share the same heap array; when both destructors run, delete[] is called on the same memory twice — undefined behavior (double-free)."},
{cat:"Copy/Move", type:"Output", q:"What does this print (assume typical compiler behavior, no elision)?", code:"class T {\npublic:\n    T() { cout << \"ctor \"; }\n    T(const T&) { cout << \"copy \"; }\n    T(T&&) noexcept { cout << \"move \"; }\n};\nT makeT() { return T(); }\nint main() {\n    T a = makeT();\n}", options:["ctor copy", "ctor move", "ctor", "ctor copy move"], correct:2, exp:"Since C++17, copy elision for this exact pattern (returning a prvalue of the function's own return type directly) is MANDATORY — no copy or move constructor call happens at all, even conceptually. Only the default constructor runs, so output is just 'ctor'."},
{cat:"Copy/Move", type:"Bug", q:"What's wrong with this move constructor?", code:"class Handle {\n    int* ptr;\npublic:\n    Handle(int* p) : ptr(p) {}\n    Handle(Handle&& other) noexcept {\n        ptr = other.ptr;\n        // forgot to null out other.ptr\n    }\n    ~Handle() { delete ptr; }\n};", options:["Nothing wrong", "Double-free: when 'other' is later destroyed, it deletes the same ptr that was 'moved' into the new object", "Memory leak — ptr is never freed", "Compile error, move constructors must be const"], correct:1, exp:"After the move, both 'other' and the new object hold the SAME pointer. When 'other' eventually goes out of scope, its destructor deletes that pointer — and later, when the new object is destroyed, it deletes the SAME pointer again. The source must be nulled out after stealing its resource to prevent this."},
{cat:"Copy/Move", type:"Output", q:"What does this print?", code:"class Str {\n    string s;\npublic:\n    Str(string v) : s(v) { cout << \"ctor \"; }\n    Str(const Str& o) : s(o.s) { cout << \"copy \"; }\n};\nvoid useByValue(Str x) { }\nint main() {\n    Str a(\"hi\");\n    useByValue(a);\n}", options:["ctor", "ctor copy", "ctor ctor", "copy"], correct:1, exp:"Str a(\"hi\") calls the string-constructor (prints 'ctor'). Passing 'a' (an lvalue) by value into useByValue requires a copy, invoking the copy constructor (prints 'copy'). Total: 'ctor copy'."},
{cat:"Copy/Move", type:"UB?", q:"Is using 'a' after this line UB?", code:"std::string a = \"hello\";\nstd::string b = std::move(a);\ncout << a;  // using 'a' after being moved from", options:["Yes, always undefined behavior", "No — 'a' is left in a valid but unspecified state; using it (e.g. printing) is legal, just the VALUE is unpredictable", "Yes, because std::move actually destroys 'a'", "No, 'a' is guaranteed to be empty after being moved from"], correct:1, exp:"After being moved from, a standard library object is guaranteed to be in a 'valid but unspecified' state — using it in ways that don't assume a particular value (like printing, reassigning, or destroying it) is legal. It is NOT undefined behavior, though relying on any specific resulting value is a bug (for std::string specifically, it's often empty in practice, but this isn't guaranteed by the standard)."},
{cat:"Copy/Move", type:"Bug", q:"Self-assignment bug — what happens?", code:"class Buffer {\n    int* data;\n    int size;\npublic:\n    Buffer(int n) : size(n), data(new int[n]) {}\n    Buffer& operator=(const Buffer& rhs) {\n        delete[] data;\n        size = rhs.size;\n        data = new int[size];\n        std::copy(rhs.data, rhs.data + size, data);\n        return *this;\n    }\n};\nint main() {\n    Buffer a(10);\n    a = a;  // self assignment\n}", options:["Works fine, no issue", "Undefined behavior — data is deleted before rhs.data is read, but rhs IS a, so rhs.data is now a dangling pointer", "Compile error — self assignment is disallowed", "Memory leak but no crash"], correct:1, exp:"Since rhs is the same object as *this, `delete[] data;` frees the memory BEFORE `rhs.data` is read — but rhs.data IS data, now a dangling pointer. The subsequent std::copy reads freed memory: undefined behavior. Fix: add a self-assignment check (`if (this == &rhs) return *this;`)."},
{cat:"Copy/Move", type:"Output", q:"What does this print?", code:"class Base {\npublic:\n    virtual void speak() { cout << \"Base \"; }\n};\nclass Derived : public Base {\npublic:\n    void speak() override { cout << \"Derived \"; }\n};\nint main() {\n    Derived d;\n    Base b = d;  // slicing!\n    b.speak();\n}", options:["Derived", "Base", "Compile error", "Undefined behavior"], correct:1, exp:"Assigning a Derived object to a Base object BY VALUE slices off the Derived-specific parts — b is now genuinely just a Base object (its vptr points to Base's vtable), so b.speak() calls Base::speak()."},
{cat:"Copy/Move", type:"Bug", q:"What's the Rule of Three violation here?", code:"class Widget {\n    char* name;\npublic:\n    Widget(const char* n) { name = new char[strlen(n)+1]; strcpy(name, n); }\n    ~Widget() { delete[] name; }\n    // No copy constructor, no copy assignment operator defined\n};", options:["No violation, class is complete", "Class defines a custom destructor but not copy ctor/copy assignment — compiler-generated shallow-copy versions will cause double-free bugs", "The destructor is missing 'delete', not 'delete[]'", "Nothing wrong, strcpy handles the copying"], correct:1, exp:"Rule of Three: since this class manages a resource and needs a custom destructor, it almost certainly also needs custom copy constructor and copy assignment operator (to do a deep copy). Relying on the compiler-generated shallow-copy versions will cause double-free when two Widgets share the same 'name' pointer."},
{cat:"Copy/Move", type:"Output", q:"What does this print?", code:"class T {\npublic:\n    T() = default;\n    T(const T&) = delete;\n    T(T&&) = default;\n};\nint main() {\n    T a;\n    T b = std::move(a);  // OK?\n    T c = a;  // OK?\n}", options:["Both lines compile fine", "First line compiles (move), second line is a compile error (copy is deleted)", "Both lines are compile errors", "First line is a compile error, second compiles"], correct:1, exp:"Move is explicitly defaulted, so `T b = std::move(a);` works. Copy is explicitly deleted, so `T c = a;` (which requires the copy constructor since 'a' is an lvalue) is a compile error."},
{cat:"Copy/Move", type:"UB?", q:"Any issue with this swap implementation?", code:"template <typename T>\nvoid mySwap(T& a, T& b) {\n    T tmp = a;\n    a = b;\n    b = tmp;\n}\nint main() {\n    std::vector<int> v1{1,2,3}, v2{4,5};\n    mySwap(v1, v2);\n}", options:["Undefined behavior", "Well-defined but inefficient — makes 3 full copies instead of using move semantics (std::swap would be preferred)", "Compile error, vectors can't be swapped this way", "This will corrupt v1 and v2's contents"], correct:1, exp:"This is functionally correct (well-defined), just not efficient — it performs 3 deep copies of potentially-large vectors. std::swap (or a hand-written version using std::move) would perform 3 cheap moves instead."},
// ===== Virtual Functions / Polymorphism =====
{cat:"Virtual/Polymorphism", type:"Output", q:"What does this print?", code:"class Animal {\npublic:\n    void speak() { cout << \"Animal \"; }\n};\nclass Dog : public Animal {\npublic:\n    void speak() { cout << \"Dog \"; }\n};\nint main() {\n    Animal* a = new Dog();\n    a->speak();\n}", options:["Dog", "Animal", "Compile error", "Undefined behavior"], correct:1, exp:"speak() is NOT virtual, so the call uses static binding based on the pointer's declared type (Animal*), not the actual object type — prints 'Animal'."},
{cat:"Virtual/Polymorphism", type:"Output", q:"Same as above but speak() is virtual — what prints?", code:"class Animal {\npublic:\n    virtual void speak() { cout << \"Animal \"; }\n};\nclass Dog : public Animal {\npublic:\n    void speak() override { cout << \"Dog \"; }\n};\nint main() {\n    Animal* a = new Dog();\n    a->speak();\n}", options:["Animal", "Dog", "Compile error", "Both print"], correct:1, exp:"With speak() virtual, the call is dynamically dispatched based on the actual object type (Dog), regardless of the pointer's static type — prints 'Dog'."},
{cat:"Virtual/Polymorphism", type:"Bug", q:"What's wrong with this 'override' usage?", code:"class Base {\npublic:\n    virtual void process(int x) { cout << \"Base \"; }\n};\nclass Derived : public Base {\npublic:\n    void process(double x) override { cout << \"Derived \"; }  // note: double, not int\n};", options:["Nothing wrong — Derived overrides Base's process", "Compile error — process(double) doesn't match any virtual function in Base, so 'override' is invalid here", "Runtime error when called", "Derived::process silently hides Base::process without error"], correct:1, exp:"Base declares process(int), but Derived declares process(double) — different signature, so it does NOT actually override anything. Because 'override' is used, the compiler catches this mismatch and issues a compile error (this is exactly why 'override' should always be used)."},
{cat:"Virtual/Polymorphism", type:"Output", q:"What does this print?", code:"class Shape {\npublic:\n    virtual ~Shape() = default;\n    virtual double area() const = 0;\n};\nclass Circle : public Shape {\n    double r;\npublic:\n    Circle(double radius) : r(radius) {}\n    double area() const override { return 3.14 * r * r; }\n};\nint main() {\n    Shape* s = new Circle(2);\n    cout << s->area();\n    delete s;\n}", options:["Compile error — can't instantiate Shape", "12.56", "Undefined behavior", "0"], correct:1, exp:"Shape is abstract (has a pure virtual function) so it can't be instantiated directly, but Circle CAN be, and s (a Shape*) pointing to a Circle correctly dispatches to Circle::area() via virtual dispatch: 3.14 * 2 * 2 = 12.56."},
{cat:"Virtual/Polymorphism", type:"UB?", q:"Is this legal?", code:"class Shape {\npublic:\n    virtual double area() const = 0;\n};\nint main() {\n    Shape s;  // attempt to instantiate directly\n}", options:["Legal, s just has no area", "Compile error — cannot instantiate an abstract class", "Undefined behavior at runtime", "Legal only if Shape has a body for area()"], correct:1, exp:"Any class with at least one pure virtual function is abstract and CANNOT be instantiated directly — this is a compile-time error, not a runtime issue."},
{cat:"Virtual/Polymorphism", type:"Output", q:"What does this print?", code:"class A {\npublic:\n    virtual void f() { cout << \"A::f \"; g(); }\n    virtual void g() { cout << \"A::g \"; }\n};\nclass B : public A {\npublic:\n    void g() override { cout << \"B::g \"; }\n};\nint main() {\n    A* p = new B();\n    p->f();\n}", options:["A::f A::g", "A::f B::g", "B::g A::f", "Compile error"], correct:1, exp:"p->f() calls A::f() (B doesn't override f), which internally calls g() — since g() is virtual and the object is actually a B, this dispatches to B::g(), not A::g(). Output: 'A::f B::g'. This shows virtual dispatch happening even for calls made FROM WITHIN a base class member function."},
{cat:"Virtual/Polymorphism", type:"Output", q:"What does this print (note: NOT virtual)?", code:"class A {\npublic:\n    void f() { cout << \"A::f \"; g(); }\n    void g() { cout << \"A::g \"; }\n};\nclass B : public A {\npublic:\n    void g() { cout << \"B::g \"; }\n};\nint main() {\n    A* p = new B();\n    p->f();\n}", options:["A::f B::g", "A::f A::g", "B::g A::f", "Compile error"], correct:1, exp:"Neither f() nor g() are virtual here. p->f() statically resolves to A::f(). Inside A::f(), the call to g() is ALSO statically bound (to A::g()), since it's called as an unqualified member call within A's own code — no virtual dispatch happens anywhere. Output: 'A::f A::g'."},
{cat:"Virtual/Polymorphism", type:"Bug", q:"What's wrong with this class hierarchy design?", code:"class Base {\npublic:\n    virtual void doWork() { cout << \"Base::doWork \"; }\n    ~Base() { cout << \"~Base \"; }  // not virtual!\n};\nclass Derived : public Base {\n    vector<int> data{1,2,3};\npublic:\n    void doWork() override { cout << \"Derived::doWork \"; }\n};\nint main() {\n    unique_ptr<Base> p = make_unique<Derived>();\n    p->doWork();\n}", options:["Nothing wrong, unique_ptr handles cleanup safely regardless", "Base's destructor is not virtual — when p (a unique_ptr<Base>) is destroyed, only ~Base() runs, not ~Derived(), leaking data's contents / causing UB", "Compile error, can't use unique_ptr<Base> for a Derived object", "doWork() dispatch fails because Base's destructor isn't virtual"], correct:1, exp:"unique_ptr does NOT magically fix the non-virtual-destructor problem — when it destroys the managed object, it still just calls delete on the Base* it holds, which uses the same static-binding-based destructor call as a raw pointer. Only ~Base() runs, Derived's vector member's destructor technically still runs as part of object destruction in practice on most implementations, BUT formally this is undefined behavior per the standard since Derived's destructor was never invoked properly (deleting a Derived object through a Base pointer without a virtual destructor is UB regardless of whether a smart pointer holds that pointer)."},
{cat:"Virtual/Polymorphism", type:"Output", q:"What does this print?", code:"class Base {\npublic:\n    virtual string name() const { return \"Base\"; }\n};\nclass Derived : public Base {\npublic:\n    string name() const override { return \"Derived\"; }\n};\nvoid printName(const Base& b) {  // pass by reference\n    cout << b.name();\n}\nint main() {\n    Derived d;\n    printName(d);\n}", options:["Base", "Derived", "Compile error", "Undefined behavior"], correct:1, exp:"Passing by REFERENCE (not by value) avoids slicing — b still refers to the actual Derived object, so virtual dispatch correctly resolves to Derived::name()."},
{cat:"Virtual/Polymorphism", type:"Bug", q:"What's the bug in this function?", code:"class Base {\npublic:\n    virtual string name() const { return \"Base\"; }\n};\nclass Derived : public Base {\npublic:\n    string name() const override { return \"Derived\"; }\n};\nvoid printName(Base b) {  // pass BY VALUE\n    cout << b.name();\n}\nint main() {\n    Derived d;\n    printName(d);\n}", options:["No bug, prints 'Derived'", "Object slicing — b is a genuine Base copy, prints 'Base' instead of the expected 'Derived'", "Compile error", "Undefined behavior"], correct:1, exp:"Passing 'd' BY VALUE into a Base parameter slices it down to just the Base portion — b is a real Base object, so b.name() calls Base::name(), printing 'Base', likely NOT what the caller intended."},
{cat:"Virtual/Polymorphism", type:"Output", q:"What does this print?", code:"class Base {\npublic:\n    virtual void f() const { cout << \"Base \"; }\n};\nclass Mid : public Base {\npublic:\n    void f() const override { cout << \"Mid \"; }\n};\nclass Derived : public Mid {\npublic:\n    void f() const override { cout << \"Derived \"; }\n};\nint main() {\n    Base* arr[2] = { new Mid(), new Derived() };\n    for (auto* p : arr) p->f();\n}", options:["Base Base", "Mid Derived", "Mid Mid", "Derived Derived"], correct:1, exp:"Virtual dispatch always calls the MOST-DERIVED override for each object's actual type — the Mid object calls Mid::f(), the Derived object calls Derived::f(). Output: 'Mid Derived'."},
{cat:"Virtual/Polymorphism", type:"Output", q:"What does this print? (covariant return types)", code:"class Base {\npublic:\n    virtual Base* clone() const { cout << \"Base::clone \"; return new Base(*this); }\n};\nclass Derived : public Base {\npublic:\n    Derived* clone() const override { cout << \"Derived::clone \"; return new Derived(*this); }  // covariant return\n};\nint main() {\n    Base* b = new Derived();\n    Base* c = b->clone();\n}", options:["Compile error — return types don't match", "Base::clone", "Derived::clone", "Undefined behavior"], correct:2, exp:"Covariant return types are legal: Derived::clone() returns Derived* (more specific than Base*), which is allowed for an override since a Derived* is safely usable as a Base*. Virtual dispatch on b (actually a Derived) correctly calls Derived::clone()."},
{cat:"Virtual/Polymorphism", type:"UB?", q:"Is this dynamic_cast usage safe?", code:"class Base { public: virtual ~Base() = default; };\nclass Derived : public Base { public: void extra() { cout << \"extra\"; } };\nclass Other : public Base { };\nint main() {\n    Base* b = new Other();\n    Derived* d = dynamic_cast<Derived*>(b);\n    if (d) d->extra();\n    else cout << \"cast failed safely\";\n}", options:["Undefined behavior — casting Other* to Derived*", "Well-defined — dynamic_cast returns nullptr since b doesn't actually point to a Derived, and the code correctly checks for that", "Compile error", "Crashes at the dynamic_cast line"], correct:1, exp:"dynamic_cast performs a RUNTIME check; since b actually points to an Other (not a Derived), it safely returns nullptr rather than performing an invalid cast. The if(d) check correctly handles this — no UB."},
{cat:"Virtual/Polymorphism", type:"UB?", q:"Is THIS static_cast usage safe?", code:"class Base { public: virtual ~Base() = default; };\nclass Derived : public Base { public: void extra() { cout << \"extra\"; } };\nclass Other : public Base { };\nint main() {\n    Base* b = new Other();\n    Derived* d = static_cast<Derived*>(b);  // static_cast instead of dynamic_cast\n    d->extra();\n}", options:["Well-defined, same as dynamic_cast", "Undefined behavior — static_cast performs no runtime check, so 'd' incorrectly treats an Other object as a Derived, and calling extra() accesses memory that doesn't actually exist in Other's layout", "Compile error", "Safe because Base is polymorphic"], correct:1, exp:"static_cast does NOT check at runtime whether the cast is actually valid. Since b really points to an Other (not a Derived), d is a bogus pointer treating Other's memory as if it were Derived's layout — calling extra() is undefined behavior."},
// ===== Operator Overloading =====
{cat:"Operator Overloading", type:"Bug", q:"What's wrong with this operator+ overload?", code:"class Point {\n    int x, y;\npublic:\n    Point(int x, int y) : x(x), y(y) {}\n    Point operator+(Point& other) {  // note: non-const reference\n        return Point(x + other.x, y + other.y);\n    }\n};\nint main() {\n    Point p1(1,2), p2(3,4);\n    Point p3 = p1 + Point(5, 6);  // temporary as argument\n}", options:["No issue, compiles and runs fine", "Compile error — a non-const lvalue reference parameter can't bind to the temporary Point(5,6)", "Undefined behavior at runtime", "p3 will have garbage values"], correct:1, exp:"operator+ takes 'other' by non-const reference, but Point(5,6) is a temporary (rvalue) — a non-const lvalue reference cannot bind to an rvalue. This is a compile error. Fix: take the parameter as `const Point&`."},
{cat:"Operator Overloading", type:"Output", q:"What does this print?", code:"class Counter {\n    int val;\npublic:\n    Counter(int v) : val(v) {}\n    Counter& operator++() { ++val; return *this; }\n    Counter operator++(int) { Counter tmp = *this; ++val; return tmp; }\n    int get() const { return val; }\n};\nint main() {\n    Counter c(5);\n    Counter d = c++;\n    cout << c.get() << \" \" << d.get();\n}", options:["6 6", "5 6", "6 5", "5 5"], correct:2, exp:"Postfix c++ saves a copy of c's CURRENT value (val=5) into tmp, THEN increments c to 6, and returns tmp (still holding 5). So c.get()=6, d.get()=5. Output: '6 5'."},
{cat:"Operator Overloading", type:"Bug", q:"What's wrong with this operator<< attempt?", code:"class Point {\n    int x, y;\npublic:\n    Point(int x, int y) : x(x), y(y) {}\n    ostream& operator<<(ostream& out) {  // as a MEMBER function\n        out << x << \",\" << y;\n        return out;\n    }\n};\nint main() {\n    Point p(1, 2);\n    cout << p;  // won't compile as intended\n}", options:["Works fine", "Compile error — as written, this defines p << cout, not cout << p; operator<< as a member has the class as the LEFT operand", "Compiles but prints garbage", "Undefined behavior"], correct:1, exp:"A member operator<< makes the CLASS the implicit left (this) operand — so this actually overloads `p << someOstream`, not `cout << p`. Since 'cout << p' has ostream as the LEFT operand, operator<< for this purpose MUST be a non-member (free/friend) function."},
{cat:"Operator Overloading", type:"Output", q:"What does this print?", code:"class Fraction {\n    int num, den;\npublic:\n    Fraction(int n, int d) : num(n), den(d) {}\n    bool operator==(const Fraction& o) const {\n        return num * o.den == o.num * den;\n    }\n};\nint main() {\n    Fraction a(1, 2), b(2, 4);\n    cout << (a == b);\n}", options:["0", "1", "Compile error", "Undefined behavior"], correct:1, exp:"1/2 and 2/4 are equal fractions. The cross-multiplication check: 1*4 == 2*2 -> 4 == 4 -> true, prints '1' (bool printed as 1/0 by default)."},
{cat:"Operator Overloading", type:"Bug", q:"What's the issue with this subscript operator?", code:"class Arr {\n    int data[5]{};\npublic:\n    int operator[](int i) {  // returns by VALUE\n        return data[i];\n    }\n};\nint main() {\n    Arr a;\n    a[2] = 10;  // attempt to assign\n}", options:["Works fine, sets element 2 to 10", "Compile error — a[2] returns a temporary int by value, which isn't an lvalue and can't be assigned to", "Undefined behavior", "Sets a random element instead of index 2"], correct:1, exp:"operator[] returns by VALUE here, producing a temporary int (an rvalue). `a[2] = 10;` tries to assign to that temporary, which isn't a valid lvalue target — compile error. Fix: return `int&` instead."},
{cat:"Operator Overloading", type:"Output", q:"What does this print?", code:"class Wrapper {\n    int val;\npublic:\n    Wrapper(int v) : val(v) {}\n    operator int() const { return val; }  // implicit conversion operator\n};\nint main() {\n    Wrapper w(42);\n    int x = w + 8;\n    cout << x;\n}", options:["Compile error — can't add Wrapper and int", "50", "42", "Undefined behavior"], correct:1, exp:"The implicit conversion operator lets 'w' silently convert to int (42) when needed by operator+ — 42 + 8 = 50."},
{cat:"Operator Overloading", type:"Bug", q:"What's dangerous about this class?", code:"class Meters {\n    double value;\npublic:\n    Meters(double v) : value(v) {}  // NOT explicit\n    double get() const { return value; }\n};\nvoid printDistance(Meters m) { cout << m.get(); }\nint main() {\n    printDistance(5.0);  // passing a raw double\n}", options:["Compile error, double can't implicitly become Meters", "Compiles fine because the non-explicit single-argument constructor allows an implicit double-to-Meters conversion — potentially unintended/confusing", "Undefined behavior", "printDistance receives a garbage Meters object"], correct:1, exp:"Because the constructor isn't marked explicit, it acts as a converting constructor — any raw double silently converts to a Meters object. This compiles, but may not be intended (e.g. accidentally passing a value in the wrong unit with no compiler warning). Marking the constructor 'explicit' would catch this at compile time."},
{cat:"Operator Overloading", type:"Output", q:"What does this print?", code:"class Vec {\n    int x;\npublic:\n    Vec(int x) : x(x) {}\n    friend Vec operator+(const Vec& a, const Vec& b) { return Vec(a.x + b.x); }\n    friend ostream& operator<<(ostream& out, const Vec& v) { return out << v.x; }\n};\nint main() {\n    Vec a(3), b(4);\n    cout << a + b + Vec(1);\n}", options:["7", "8", "Compile error", "Undefined behavior"], correct:1, exp:"operator+ is left-associative: (a + b) + Vec(1) = Vec(7) + Vec(1) = Vec(8). Prints '8'."},
{cat:"Operator Overloading", type:"Bug", q:"What's wrong with this operator= implementation?", code:"class Str {\n    char* data;\npublic:\n    Str(const char* s) { data = new char[strlen(s)+1]; strcpy(data, s); }\n    Str& operator=(const Str& other) {\n        delete[] data;\n        data = new char[strlen(other.data)+1];\n        strcpy(data, other.data);\n        return *this;\n    }\n    ~Str() { delete[] data; }\n};\nint main() {\n    Str s(\"hello\");\n    s = s;  // self assignment\n}", options:["No issue", "Undefined behavior — delete[] data frees the memory before other.data (which IS data) is read for the strcpy source", "Memory leak only, no crash", "Compile error"], correct:1, exp:"Since 'other' IS 's' in self-assignment, `delete[] data;` frees the exact memory that `other.data` still points to — the subsequent strlen(other.data)/strcpy(data, other.data) reads freed memory. This is undefined behavior. Needs a self-assignment guard: `if (this == &other) return *this;`"},
{cat:"Operator Overloading", type:"Output", q:"What does this print?", code:"class Flag {\n    bool val;\npublic:\n    Flag(bool v) : val(v) {}\n    Flag operator!() const { return Flag(!val); }\n    operator bool() const { return val; }\n};\nint main() {\n    Flag f(true);\n    if (!f) cout << \"false branch\";\n    else cout << \"true branch\";\n}", options:["false branch", "true branch", "Compile error — ambiguous which ! to use", "Undefined behavior"], correct:1, exp:"!f invokes the overloaded operator!(), returning Flag(false). That Flag is then implicitly converted to bool via operator bool() for the if-condition, giving false — so the else branch ('true branch') runs."},
// ===== References & Pointers =====
{cat:"References & Pointers", type:"UB?", q:"Is this function safe to call?", code:"int& getRef() {\n    int local = 42;\n    return local;\n}\nint main() {\n    int& r = getRef();\n    cout << r;\n}", options:["Safe, prints 42", "Undefined behavior — returns a reference to a destroyed local variable", "Compile error", "Prints 0"], correct:1, exp:"local is destroyed when getRef() returns (automatic/stack duration). r is left as a dangling reference; using it is undefined behavior, even though it might 'accidentally' print 42 on some compilers/optimization levels."},
{cat:"References & Pointers", type:"Output", q:"What does this print?", code:"int x = 10;\nint& r = x;\nr = 20;\nint& r2 = r;  // reference to a reference (really just another ref to x)\nr2 = 30;\ncout << x << \" \" << r << \" \" << r2;", options:["10 10 10", "30 30 30", "20 20 20", "10 20 30"], correct:1, exp:"r is just an alias for x, and r2 is an alias for r — which is itself just an alias for x. All three names ultimately refer to the SAME object. After r=20 then r2=30, x is now 30, and all three print 30."},
{cat:"References & Pointers", type:"Bug", q:"What's wrong with this code?", code:"void modify(int& x) { x = 100; }\nint main() {\n    modify(5);  // passing a literal to a non-const reference parameter\n}", options:["Compiles and works fine", "Compile error — a non-const lvalue reference cannot bind to the rvalue literal 5", "Undefined behavior", "5 silently becomes 100 in some contexts"], correct:1, exp:"5 is an rvalue (a literal). A non-const lvalue reference parameter (int&) can only bind to a modifiable lvalue — this is a compile error. It would work if the parameter were `const int&` (though then modifying x inside would ALSO be a compile error)."},
{cat:"References & Pointers", type:"Output", q:"What does this print?", code:"const int& getConstRef() {\n    return 42;  // binds a temporary to a returned const reference\n}\nint main() {\n    cout << getConstRef();\n}", options:["Compile error", "Undefined behavior — returning a reference to a temporary", "42, safely", "0, garbage suppressed"], correct:1, exp:"While `const int& r = 42;` as a LOCAL variable extends the temporary's lifetime to match the reference's, this lifetime extension does NOT apply across a function RETURN boundary — the temporary 42 is destroyed when the function returns, leaving a dangling reference. This is undefined behavior, a subtle and commonly-missed exception to the temporary-lifetime-extension rule."},
{cat:"References & Pointers", type:"Bug", q:"What's the bug?", code:"int* createArray(int n) {\n    int arr[n];  // wait -- this doesn't even compile in standard C++ for non-constexpr n on most compilers, but assume it's fixed size:\n    int arr2[10];\n    return arr2;  // returning pointer to LOCAL array\n}\nint main() {\n    int* p = createArray(5);\n    cout << p[0];\n}", options:["Works fine, prints the first element", "Undefined behavior — arr2 decays to a pointer, but arr2 itself is destroyed when the function returns", "Compile error, arrays can't decay to pointers in a return statement", "Always prints 0"], correct:1, exp:"arr2 is a local (stack) array; returning it decays to a pointer to its first element, but the array's storage is destroyed when the function returns — p is left dangling. Using p[0] afterward is undefined behavior."},
{cat:"References & Pointers", type:"Output", q:"What does this print?", code:"int a = 5;\nint* p1 = &a;\nint* const p2 = p1;  // const pointer\n*p2 = 10;   // modify through p2\n// p2 = nullptr;  // this line, if uncommented, would be a compile error\ncout << a;", options:["5", "10", "Compile error on *p2 = 10", "Undefined behavior"], correct:1, exp:"p2 is a CONST POINTER (can't be reseated) but points to a NON-const int — modifying the pointee through it (*p2 = 10) is perfectly legal. Only reseating p2 itself would be illegal. a becomes 10."},
{cat:"References & Pointers", type:"Bug", q:"What's wrong with this const-pointer usage?", code:"int a = 5;\nconst int* p = &a;  // pointer to const\n*p = 10;  // attempt to modify through p", options:["Works fine, a becomes 10", "Compile error — can't modify *p since p is a pointer-to-const", "Undefined behavior", "p itself becomes invalid"], correct:1, exp:"`const int* p` means the POINTEE is treated as const through this pointer — `*p = 10;` is a compile error. (Note: 'a' itself isn't actually const, so modifying it through a DIFFERENT, non-const pointer/reference would still be fine — the constness restriction is only on access through p.)"},
{cat:"References & Pointers", type:"UB?", q:"Is this safe?", code:"std::vector<int> vec{1,2,3,4,5};\nint* p = &vec[0];\nvec.push_back(6);  // may trigger reallocation\ncout << *p;", options:["Safe, always prints 1", "Undefined behavior if push_back triggers a reallocation — p may now be dangling", "Compile error", "Always crashes"], correct:1, exp:"push_back CAN trigger reallocation if the vector's capacity is exceeded, which invalidates all existing pointers/iterators/references into the old buffer. Since we can't guarantee capacity wasn't exceeded, using p afterward is potentially undefined behavior."},
{cat:"References & Pointers", type:"Output", q:"What does this print?", code:"void increment(int* p) {\n    if (p) (*p)++;\n}\nint main() {\n    int x = 5;\n    increment(&x);\n    increment(nullptr);  // safe due to null check\n    cout << x;\n}", options:["5", "6", "Crash", "Undefined behavior"], correct:1, exp:"increment(&x) increments x to 6. increment(nullptr) is safely skipped due to the `if (p)` null check before dereferencing. Final x = 6."},
{cat:"References & Pointers", type:"Bug", q:"Spot the bug.", code:"void swap(int* a, int* b) {\n    int temp = *a;\n    *a = *b;\n    *b = temp;\n}\nint main() {\n    int x = 1, y = 2;\n    swap(x, y);  // passing values instead of addresses\n}", options:["Compiles and swaps correctly", "Compile error — swap expects int*, but x and y are int, not addresses", "Undefined behavior at runtime", "Swaps silently but incorrectly"], correct:1, exp:"swap's parameters are int* (pointers), but x and y are being passed directly (as int values), not their addresses (&x, &y) — this is a type mismatch and a compile error."},
// ===== Static Members =====
{cat:"Static Members", type:"Output", q:"What does this print?", code:"class Widget {\n    static int nextId;\n    int id;\npublic:\n    Widget() : id(nextId++) {}\n    int getId() const { return id; }\n};\nint Widget::nextId = 100;\nint main() {\n    Widget a, b, c;\n    cout << a.getId() << \" \" << b.getId() << \" \" << c.getId();\n}", options:["100 100 100", "100 101 102", "0 1 2", "Compile error"], correct:1, exp:"nextId is shared across ALL instances (static). Each construction uses the current nextId then post-increments it: a gets 100 (nextId becomes 101), b gets 101 (becomes 102), c gets 102. Output: '100 101 102'."},
{cat:"Static Members", type:"Bug", q:"What's wrong with this code?", code:"class Config {\n    static const int maxSize = 100;  // in-class initialization\npublic:\n    static int getMax() { return maxSize; }\n};\nint main() {\n    cout << Config::getMax();\n}", options:["Compile error — static const int can't be initialized in-class", "Works fine — static const integral types CAN be initialized in-class (implicitly inline in this usage)", "Linker error — missing out-of-class definition", "Undefined behavior"], correct:1, exp:"static const (or constexpr) INTEGRAL types are a special case that CAN be initialized directly in the class body — no separate out-of-class definition is needed as long as it's only ever used in ways that don't require an address (like here, just returning its value) . This is legal, unlike a general static member which needs an out-of-class definition."},
{cat:"Static Members", type:"Bug", q:"What's the compile error here?", code:"class Counter {\n    static int count;\npublic:\n    void increment() {\n        count++;\n    }\n};\nint main() {\n    Counter c;\n    c.increment();\n}", options:["No error, works fine", "Linker error — 'count' is declared but never DEFINED outside the class (missing `int Counter::count = 0;`)", "Compile error at the declaration", "Undefined behavior"], correct:1, exp:"A (non-inline, pre-C++17-style) static member variable must be DEFINED exactly once outside the class, e.g. `int Counter::count = 0;` in a .cpp file. Without this definition, you get a LINKER error ('undefined reference to Counter::count') when the program tries to actually use it."},
{cat:"Static Members", type:"Output", q:"What does this print?", code:"class Util {\npublic:\n    static int square(int x) { return x * x; }\n};\nint main() {\n    Util u;\n    cout << u.square(5) << \" \" << Util::square(6);\n}", options:["25 36", "Compile error — can't call a static function through an instance", "25 25", "36 36"], correct:0, exp:"Static member functions CAN be called either through an instance (u.square(5)) or directly via the class name (Util::square(6)) — both are valid syntax, though calling via the class name is generally preferred/clearer since it emphasizes no specific object is involved. Output: '25 36'."},
{cat:"Static Members", type:"Bug", q:"Why won't this compile?", code:"class Widget {\n    int value;\n    static int total;\npublic:\n    static void addToTotal() {\n        total += value;  // accessing non-static member from static function\n    }\n};", options:["Compiles fine", "Compile error — static member functions have no 'this' pointer and cannot access non-static members directly", "Undefined behavior", "Only a warning, not an error"], correct:1, exp:"Static member functions aren't associated with any particular object — there's no implicit 'this', so they can't access instance-specific (non-static) members like 'value' without being given a specific object to operate on."},
// ===== Inheritance & Access Specifiers =====
{cat:"Inheritance", type:"Bug", q:"What's the compile error here?", code:"class Base {\nprivate:\n    int secret = 42;\n};\nclass Derived : public Base {\npublic:\n    int reveal() { return secret; }  // accessing base's private member\n};", options:["No error, Derived can access inherited members", "Compile error — 'secret' is private in Base, and private members are NOT accessible from derived classes, even with public inheritance", "Runtime error", "secret is silently treated as 0"], correct:1, exp:"Private base-class members are NEVER accessible from a derived class directly (regardless of the inheritance type used) — only Base's own member functions (or friends) can access 'secret'. This is a compile error."},
{cat:"Inheritance", type:"Output", q:"What does this print?", code:"class Animal {\npublic:\n    void speak() { cout << \"generic sound \"; }\n};\nclass Dog : public Animal {\npublic:\n    void speak() { cout << \"woof \"; }\n};\nint main() {\n    Dog d;\n    d.speak();\n    d.Animal::speak();  // explicit scope-qualified call\n}", options:["woof woof", "woof generic sound", "generic sound woof", "Compile error"], correct:1, exp:"d.speak() calls Dog's own (redefined) speak(), printing 'woof '. d.Animal::speak() explicitly calls the BASE version via scope resolution, printing 'generic sound '. Output: 'woof generic sound '."},
{cat:"Inheritance", type:"Bug", q:"What's wrong with this constructor?", code:"class Base {\npublic:\n    Base(int x) { cout << \"Base(\" << x << \") \"; }\n};\nclass Derived : public Base {\npublic:\n    Derived(int x, int y) {  // no explicit Base() call\n        cout << \"Derived(\" << x << \",\" << y << \") \";\n    }\n};\nint main() {\n    Derived d(1, 2);\n}", options:["Compiles fine, uses Base's default constructor", "Compile error — Base has no default constructor, and Derived doesn't explicitly call any Base constructor", "Undefined behavior", "Compiles, Base(0) is called implicitly"], correct:1, exp:"Since Base has NO default constructor (only Base(int)), and Derived's constructor doesn't explicitly specify which Base constructor to call in its initializer list, the compiler tries to implicitly call Base's default constructor — which doesn't exist. Compile error."},
{cat:"Inheritance", type:"Output", q:"What does this print?", code:"class A {\npublic:\n    A() { cout << \"A \"; }\n};\nclass B : public A {\npublic:\n    B() { cout << \"B \"; }\n};\nclass C : public B {\npublic:\n    C() { cout << \"C \"; }\n};\nint main() {\n    C c;\n}", options:["C B A", "A B C", "C A B", "A C B"], correct:1, exp:"Construction always proceeds from most-base to most-derived: A's constructor runs first, then B's, then C's. Output: 'A B C'."},
{cat:"Inheritance", type:"Bug", q:"What's wrong with this name-hiding scenario?", code:"class Base {\npublic:\n    void print(int x) { cout << \"int: \" << x; }\n    void print(double x) { cout << \"double: \" << x; }\n};\nclass Derived : public Base {\npublic:\n    void print(string s) { cout << \"string: \" << s; }  // new overload\n};\nint main() {\n    Derived d;\n    d.print(5);  // intending to call Base's int version\n}", options:["Calls Base::print(int), prints 'int: 5'", "Compile error — Derived::print(string) HIDES all Base::print overloads, so print(5) has no matching overload visible", "Calls Base::print(double) after promotion", "Undefined behavior"], correct:1, exp:"Derived's print(string) declaration hides the ENTIRE Base::print overload set, not just the ones with matching signatures. d.print(5) can't find a matching Derived::print (int doesn't convert to string implicitly in a matching way) and Base's overloads aren't visible — compile error. Fix: add `using Base::print;` in Derived."},
{cat:"Inheritance", type:"Output", q:"What does protected inheritance do here?", code:"class Base {\npublic:\n    int pub = 1;\nprotected:\n    int prot = 2;\n};\nclass Derived : protected Base {  // protected inheritance\npublic:\n    void show() { cout << pub << \" \" << prot; }  // accessing from within Derived - OK\n};\nint main() {\n    Derived d;\n    d.show();\n    // cout << d.pub;  // this line would be a compile error\n}", options:["1 2, and d.pub would also work fine outside", "1 2, but d.pub from outside main() would be a compile error since pub becomes protected in Derived", "Compile error inside show() too", "2 1"], correct:1, exp:"With PROTECTED inheritance, Base's public member 'pub' becomes PROTECTED in Derived (accessible within Derived's own members and further-derived classes, but NOT from outside). show() can access both pub and prot internally (prints '1 2'), but external code like `d.pub` would be a compile error."},
{cat:"Inheritance", type:"Bug", q:"What's the diamond problem here?", code:"class PoweredDevice { public: int power = 100; };\nclass Scanner : public PoweredDevice {};\nclass Printer : public PoweredDevice {};\nclass Copier : public Scanner, public Printer {};\nint main() {\n    Copier c;\n    cout << c.power;  // ambiguous?\n}", options:["Prints 100, no issue", "Compile error — ambiguous, Copier has TWO separate copies of PoweredDevice::power (via Scanner and via Printer)", "Undefined behavior", "Prints 200"], correct:1, exp:"Without virtual inheritance, Copier contains TWO separate PoweredDevice subobjects (one via Scanner, one via Printer) — 'c.power' is ambiguous; the compiler doesn't know which copy you mean. Must disambiguate with `c.Scanner::power` or `c.Printer::power`, or fix the design with virtual inheritance of PoweredDevice."},
{cat:"Inheritance", type:"Output", q:"What does this print with virtual inheritance?", code:"class PoweredDevice { public: int power = 100; };\nclass Scanner : virtual public PoweredDevice {};\nclass Printer : virtual public PoweredDevice {};\nclass Copier : public Scanner, public Printer {};\nint main() {\n    Copier c;\n    cout << c.power;\n}", options:["Compile error, still ambiguous", "100 — virtual inheritance merges the two paths into a single shared PoweredDevice subobject", "200", "Undefined behavior"], correct:1, exp:"With VIRTUAL inheritance of PoweredDevice from both Scanner and Printer, Copier contains only ONE shared PoweredDevice subobject — c.power unambiguously refers to that single copy, printing 100."},
// ===== Templates =====
{cat:"Templates", type:"Bug", q:"What's wrong with this template call?", code:"template <typename T>\nT maxVal(T a, T b) { return (a > b) ? a : b; }\nint main() {\n    cout << maxVal(3, 4.5);  // mismatched types\n}", options:["Compiles fine, returns 4.5", "Compile error — T can't be deduced consistently (int vs double)", "Undefined behavior", "Compiles, silently converts 4.5 to 4"], correct:1, exp:"Both arguments must deduce to the SAME T for a single-type-parameter template — 3 suggests T=int, 4.5 suggests T=double, causing a deduction conflict/ambiguity. Compile error (unless you explicitly specify maxVal<double>(3, 4.5))."},
{cat:"Templates", type:"Bug", q:"Why does this fail to link?", code:"// mymath.h\ntemplate <typename T>\nT add(T a, T b);\n\n// mymath.cpp\ntemplate <typename T>\nT add(T a, T b) { return a + b; }\n\n// main.cpp\n#include \"mymath.h\"\nint main() { return add(1, 2); }", options:["No error, links fine", "Linker error — the template's definition lives in mymath.cpp, but main.cpp only sees the declaration, so it can't instantiate add<int> for its own translation unit", "Compile error in mymath.h", "Undefined behavior"], correct:1, exp:"Templates must have their FULL DEFINITION visible in every translation unit that uses them, since instantiation happens per-TU at compile time. Splitting a template's definition into a separate .cpp (like a normal function) causes a linker error in any OTHER .cpp file that tries to use it, since it never saw the actual template body to instantiate from."},
{cat:"Templates", type:"Output", q:"What does this print?", code:"template <int N>\nint square() { return N * N; }\nint main() {\n    cout << square<5>() << \" \" << square<3>();\n}", options:["25 9", "Compile error, N must be a type", "5 3", "Undefined behavior"], correct:0, exp:"N is a NON-TYPE template parameter (a compile-time constant value, not a type). square<5>() instantiates with N=5, returning 25; square<3>() returns 9. Output: '25 9'."},
{cat:"Templates", type:"Bug", q:"What's the issue here?", code:"template <typename T>\nvoid print(T x) { cout << x; }\n\ntemplate <typename T>\nvoid print(T* x) { cout << \"pointer: \" << *x; }  // 'partial specialization' attempt for function template\n// (actually this is a legal separate overload, not a partial specialization)\nint main() {\n    int x = 5;\n    print(&x);\n}", options:["Compile error, can't do this", "This compiles fine — it's actually function template OVERLOADING (a separate template taking T*), not illegal partial specialization; prints 'pointer: 5'", "Ambiguous call, compile error", "Undefined behavior"], correct:1, exp:"You can't PARTIALLY SPECIALIZE a function template (that's only allowed for class templates), but you CAN provide a separate, more-specific OVERLOADED function template — which is exactly what this code does (a second template taking T* is a distinct overload, not a specialization). It compiles and correctly prefers the pointer version for print(&x)."},
{cat:"Templates", type:"UB?", q:"Will this compile?", code:"template <typename T>\nT addOne(T x) { return x + 1; }\nint main() {\n    std::string s = \"hello\";\n    cout << addOne(s);  // instantiating with T=std::string\n}", options:["Compiles fine, adds 1 like a number", "Compile error — std::string has no operator+ that accepts an int the way this expects (there's no valid `string + 1` overload matching this usage)", "Undefined behavior at runtime", "Compiles and appends the character with ASCII value 1"], correct:1, exp:"When addOne is instantiated with T=std::string, the body tries `x + 1` — std::string DOES have operator+ overloads, but none that behave the way a naive `+1` might suggest in a way that type-checks here (string + int isn't a defined operation) — this fails to compile at the point of INSTANTIATION, not at the template's original definition."},
// ===== Const Correctness =====
{cat:"Const Correctness", type:"Bug", q:"What's wrong with this code?", code:"class Widget {\n    int value;\npublic:\n    Widget(int v) : value(v) {}\n    int getValue() { return value; }  // NOT const\n};\nvoid printWidget(const Widget& w) {\n    cout << w.getValue();  // calling non-const method on const ref\n}", options:["Compiles fine", "Compile error — getValue() is not const, so it cannot be called on a const Widget&", "Undefined behavior", "Only a warning"], correct:1, exp:"A const object/reference can only have CONST member functions called on it. getValue() isn't marked const, so calling it through 'w' (a const Widget&) is a compile error. Fix: mark getValue() as `int getValue() const`."},
{cat:"Const Correctness", type:"Output", q:"What does this print?", code:"class Box {\n    mutable int accessCount = 0;\n    int value;\npublic:\n    Box(int v) : value(v) {}\n    int getValue() const {\n        accessCount++;  // legal because accessCount is mutable\n        return value;\n    }\n    int getAccessCount() const { return accessCount; }\n};\nint main() {\n    const Box b(42);\n    b.getValue(); b.getValue(); b.getValue();\n    cout << b.getAccessCount();\n}", options:["Compile error", "0", "3", "Undefined behavior"], correct:2, exp:"'mutable' allows a member to be modified even from a const member function (and even on a genuinely const object) — accessCount increments each of the 3 calls, so getAccessCount() correctly reports 3."},
{cat:"Const Correctness", type:"Bug", q:"What's wrong here?", code:"class Container {\n    int data[5]{1,2,3,4,5};\npublic:\n    int& operator[](int i) { return data[i]; }\n    // no const overload of operator[]\n};\nvoid printFirst(const Container& c) {\n    cout << c[0];  // indexing a const Container\n}", options:["Compiles fine", "Compile error — only the non-const operator[] exists, which can't be called on a const Container", "Undefined behavior", "Prints garbage"], correct:1, exp:"Without a `const` overload of operator[], a const Container has NO valid operator[] to call — the existing one is non-const and thus unusable on a const object. Compile error. Fix: add `const int& operator[](int i) const { return data[i]; }`."},
{cat:"Const Correctness", type:"Output", q:"What does this print?", code:"void modify(const int* p) {\n    // *p = 10;  // this would be a compile error, commented out\n    int local = *p + 1;\n    cout << local;\n}\nint main() {\n    int x = 5;\n    modify(&x);\n    cout << \" \" << x;\n}", options:["6 6", "6 5", "5 5", "Compile error"], correct:1, exp:"modify receives a pointer-to-const — it can READ *p but not modify it. local = *p+1 = 6, printed. x itself is never modified through modify(), so it remains 5. Output: '6 5'."},
{cat:"Const Correctness", type:"Bug", q:"Why won't this compile?", code:"class Vec {\n    std::vector<int> data;\npublic:\n    void add(int x) { data.push_back(x); }\n    int size() const {\n        data.push_back(0);  // modifying inside a const function\n        return data.size();\n    }\n};", options:["Compiles fine", "Compile error — push_back modifies 'data', which isn't allowed in a const member function (data isn't mutable)", "Undefined behavior", "Only a runtime error"], correct:1, exp:"size() is marked const, meaning it promises not to modify the object's state — but push_back() mutates 'data'. Since 'data' isn't marked mutable, this is a compile error."},
// ===== Friend =====
{cat:"Friend", type:"Output", q:"What does this print?", code:"class Box {\n    int secret = 42;\n    friend void reveal(const Box& b);\n};\nvoid reveal(const Box& b) { cout << b.secret; }\nint main() {\n    Box b;\n    reveal(b);\n}", options:["Compile error", "42", "Undefined behavior", "0"], correct:1, exp:"reveal() is declared a friend of Box, granting it access to Box's private members despite not being a member function itself. Prints 42."},
{cat:"Friend", type:"Bug", q:"What's wrong with this assumption?", code:"class A {\n    int secretA = 1;\n    friend class B;\n};\nclass B {\n    int secretB = 2;\n    // NOT declared friend of A\npublic:\n    void tryAccess(A& a) { cout << a.secretA; }  // this works, B is a friend of A\n};\nclass C : public B {\npublic:\n    void tryAccess2(A& a) { cout << a.secretA; }  // does C inherit B's friendship?\n};", options:["Both work fine, friendship is inherited", "tryAccess() works (B is a friend of A), but tryAccess2() is a compile error — friendship is NOT inherited by derived classes", "Neither works", "Only tryAccess2 works"], correct:1, exp:"B is explicitly declared a friend of A, so B's member functions can access A's private members — tryAccess() works. But friendship is NOT transitive/inherited: C deriving from B does NOT automatically make C a friend of A, so tryAccess2() is a compile error."},
{cat:"Friend", type:"Bug", q:"Is this friendship mutual?", code:"class A {\n    int secretA = 1;\n    friend class B;  // A declares B a friend\npublic:\n    void tryAccessB(B& b);  // wants to access B's private members\n};\nclass B {\n    int secretB = 2;\npublic:\n};\n// definition:\nvoid A::tryAccessB(B& b) { cout << b.secretB; }", options:["Works fine, friendship is always mutual", "Compile error — A declared B a friend, but that does NOT make A a friend of B; B never granted A access", "Undefined behavior", "Only works if compiled with a specific flag"], correct:1, exp:"Friendship is one-directional/not mutual: A saying 'B is my friend' only lets B access A's privates — it does NOT automatically grant A access to B's privates. Since B never declared A a friend, A::tryAccessB() trying to read b.secretB is a compile error."},
// ===== Memory Management (new/delete) =====
{cat:"Memory Management", type:"Bug", q:"What's wrong with this code?", code:"int* arr = new int[10];\ndelete arr;  // should be delete[]", options:["No issue, delete works the same as delete[]", "Undefined behavior — mismatched new[]/delete (array allocated with new[] must be freed with delete[])", "Compile error", "Memory leak only, no other issue"], correct:1, exp:"Allocating with new[] and freeing with plain delete (instead of delete[]) is undefined behavior — the mismatch can cause incorrect destructor calls (for class-type elements) and/or heap corruption, even though it might 'appear to work' for simple types like int on some implementations."},
{cat:"Memory Management", type:"UB?", q:"Is this safe?", code:"int* p = new int(5);\ndelete p;\np = nullptr;\ndelete p;  // deleting nullptr", options:["Undefined behavior, double delete", "Safe — delete on a nullptr is explicitly well-defined as a no-op", "Compile error", "Crashes"], correct:1, exp:"delete (and delete[]) on a nullptr is explicitly guaranteed by the standard to be a safe no-op. This is exactly why nulling out a pointer after deleting it is good practice — it makes any ACCIDENTAL subsequent delete (or dereference-then-crash) safe/predictable."},
{cat:"Memory Management", type:"Bug", q:"What's the memory leak here?", code:"void process() {\n    int* data = new int[100];\n    if (someCondition()) {\n        return;  // early return — 'delete[] data;' never reached\n    }\n    delete[] data;\n}", options:["No leak, C++ always cleans up", "Memory leak if someCondition() is true — the early return skips the delete[]", "Compile error", "Undefined behavior regardless of the condition"], correct:1, exp:"If someCondition() is true, the function returns BEFORE reaching `delete[] data;`, leaking the allocated array. This exact scenario (early return / exception skipping cleanup) is precisely why RAII / smart pointers are preferred over manual new/delete."},
{cat:"Memory Management", type:"Output", q:"What does this print?", code:"class Resource {\npublic:\n    Resource() { cout << \"acquire \"; }\n    ~Resource() { cout << \"release \"; }\n};\nvoid mayThrow(bool doThrow) {\n    Resource r;\n    if (doThrow) throw std::runtime_error(\"oops\");\n}\nint main() {\n    try { mayThrow(true); } catch (...) { cout << \"caught \"; }\n}", options:["acquire caught", "acquire release caught", "acquire", "caught acquire release"], correct:1, exp:"r is a fully-constructed local RAII object when the exception is thrown. As the stack unwinds during exception propagation, r's destructor IS called (since it was fully constructed) — 'release' prints, THEN the exception is caught in main, printing 'caught'. Output: 'acquire release caught'."},
{cat:"Memory Management", type:"UB?", q:"Is this leaked or freed?", code:"class Node {\npublic:\n    Node* next;\n    int val;\n    Node(int v) : val(v), next(nullptr) {}\n};\nint main() {\n    Node* head = new Node(1);\n    head->next = new Node(2);\n    head = head->next;  // reassign head, losing the original pointer to Node(1)\n    delete head;\n}", options:["Both nodes are freed correctly", "Node(1) is leaked — its address was overwritten before it was ever deleted, and only Node(2) is freed", "Compile error", "Undefined behavior on the delete line"], correct:1, exp:"Reassigning head to head->next discards the only pointer to the FIRST Node (val=1) before it was ever freed — that memory is now leaked (unreachable, unfreeable). Only the second Node (val=2, now pointed to by head) gets properly deleted."},
{cat:"Memory Management", type:"Bug", q:"What's wrong with this 2D array cleanup?", code:"int** grid = new int*[5];\nfor (int i = 0; i < 5; i++) grid[i] = new int[10];\n// cleanup:\ndelete[] grid;  // forgot to delete each row first", options:["No issue, all memory freed correctly", "Memory leak — each of the 5 inner int[10] arrays is never freed, only the outer array of pointers is", "Undefined behavior only", "Compile error"], correct:1, exp:"delete[] grid only frees the OUTER array (the array of pointers) — it does NOT know to also free each row's separately-allocated int[10] array. Each of the 5 inner arrays is leaked. Correct cleanup requires a loop calling delete[] grid[i] for each row BEFORE delete[] grid."},
{cat:"Memory Management", type:"UB?", q:"Is there an issue with this unique_ptr usage?", code:"int* raw = new int(42);\nstd::unique_ptr<int> p1(raw);\nstd::unique_ptr<int> p2(raw);  // wrapping the SAME raw pointer again", options:["No issue, both manage the resource cooperatively", "Undefined behavior — both p1 and p2 independently believe they own 'raw'; when both are destroyed, 'raw' is deleted twice", "Compile error, unique_ptr disallows this", "p2's constructor silently does nothing"], correct:1, exp:"unique_ptr's whole point is EXCLUSIVE ownership, but nothing stops you from constructing two SEPARATE unique_ptrs from the same raw pointer by mistake — the compiler can't detect this. Both will independently delete 'raw' when they're destroyed: double-free, undefined behavior."},
{cat:"Memory Management", type:"UB?", q:"Any issue with this shared_ptr usage?", code:"int* raw = new int(42);\nstd::shared_ptr<int> p1(raw);\nstd::shared_ptr<int> p2(raw);  // wrapping the SAME raw pointer AGAIN (not copying p1)", options:["No issue, shared_ptr merges the reference counts automatically", "Undefined behavior — p1 and p2 have SEPARATE, independent reference-count control blocks; both will try to delete 'raw' when their own count hits 0", "Compile error", "p2 silently ignores the pointer"], correct:1, exp:"Just like the unique_ptr case, constructing a SECOND shared_ptr directly from the same raw pointer (rather than COPYING an existing shared_ptr) creates an independent reference-counting group with no awareness of the other — both eventually try to delete the same memory. Correct usage: `auto p2 = p1;` (copy), not re-wrapping the raw pointer."},
// ===== Smart Pointers =====
{cat:"Smart Pointers", type:"Bug", q:"What's wrong with this code?", code:"std::unique_ptr<int> p1 = std::make_unique<int>(5);\nstd::unique_ptr<int> p2 = p1;  // attempted copy", options:["Compiles fine, both point to the same int", "Compile error — unique_ptr's copy constructor is deleted; must use std::move(p1) instead", "Undefined behavior", "p2 becomes null silently"], correct:1, exp:"unique_ptr explicitly disables copying (copy constructor deleted) to enforce exclusive ownership. `p2 = p1;` (a copy) is a compile error — you must explicitly transfer ownership with `p2 = std::move(p1);`."},
{cat:"Smart Pointers", type:"Output", q:"What does this print?", code:"std::unique_ptr<int> p1 = std::make_unique<int>(5);\nstd::unique_ptr<int> p2 = std::move(p1);\ncout << (p1 == nullptr) << \" \" << *p2;", options:["0 5", "1 5", "1 0", "Undefined behavior — using p1 after move"], correct:1, exp:"After std::move, ownership is transferred — p1 becomes null (empty), p2 now owns the resource holding value 5. p1==nullptr is true (1), *p2 is 5. Output: '1 5'. (Checking if a moved-from unique_ptr is null is well-defined and safe — that's specifically how unique_ptr's move leaves the source.)"},
{cat:"Smart Pointers", type:"Bug", q:"What's the memory-leak risk pattern here?", code:"class Node {\npublic:\n    std::shared_ptr<Node> next;\n    std::shared_ptr<Node> prev;  // both directions use shared_ptr\n};\nint main() {\n    auto a = std::make_shared<Node>();\n    auto b = std::make_shared<Node>();\n    a->next = b;\n    b->prev = a;  // circular reference\n}", options:["No issue, shared_ptr detects and handles cycles", "Memory leak — a and b's reference counts never reach 0 due to the circular shared_ptr reference; neither is ever destroyed", "Compile error", "Undefined behavior at program exit"], correct:1, exp:"a's refcount is kept alive by b->prev, and b's refcount is kept alive by a->next — a classic reference cycle. shared_ptr's simple refcounting CANNOT detect or break cycles, so neither Node is ever destroyed: a memory leak. Fix: make one direction (e.g. 'prev') a weak_ptr instead."},
{cat:"Smart Pointers", type:"Output", q:"What does this print?", code:"std::shared_ptr<int> sp = std::make_shared<int>(10);\nstd::weak_ptr<int> wp = sp;\nsp.reset();  // release the shared_ptr's ownership\nif (auto locked = wp.lock()) {\n    cout << *locked;\n} else {\n    cout << \"expired\";\n}", options:["10", "expired", "Compile error", "Undefined behavior"], correct:1, exp:"sp.reset() releases sp's ownership; since sp was the only owning shared_ptr (wp doesn't count toward the refcount), the int is destroyed. wp.lock() then correctly returns an empty/null shared_ptr (since the object no longer exists), so the else branch runs, printing 'expired'."},
{cat:"Smart Pointers", type:"Bug", q:"What's wrong with this pattern?", code:"class Widget {\npublic:\n    ~Widget() { cout << \"destroyed \"; }\n};\nWidget* raw = new Widget();\nstd::unique_ptr<Widget> smart(raw);\ndelete raw;  // ALSO manually deleting the raw pointer", options:["No issue", "Undefined behavior — 'raw' is manually deleted while 'smart' still thinks it owns it; when 'smart' later goes out of scope, it double-deletes", "Compile error", "smart automatically becomes null after the manual delete"], correct:1, exp:"'smart' now believes it owns the Widget, but the raw pointer is manually deleted separately — when 'smart' later goes out of scope and tries to delete the (already-freed) Widget again, that's a double-free: undefined behavior. Never manually manage a raw pointer that's also owned by a smart pointer."},
// ===== Enums & Structs =====
{cat:"Enums & Structs", type:"Output", q:"What does this print?", code:"enum Color { red, green = 5, blue };\nint main() {\n    cout << red << \" \" << green << \" \" << blue;\n}", options:["0 5 6", "0 1 2", "1 5 6", "0 5 1"], correct:0, exp:"red defaults to 0. green is explicitly set to 5. blue, with no explicit value, continues from the previous enumerator: 5+1=6. Output: '0 5 6'."},
{cat:"Enums & Structs", type:"Bug", q:"What's wrong with this comparison?", code:"enum class Color { red, green, blue };\nenum class Fruit { apple, banana };\nint main() {\n    Color c = Color::red;\n    Fruit f = Fruit::apple;\n    if (c == f) cout << \"equal\";  // comparing different enum class types\n}", options:["Compiles fine, compares underlying int values", "Compile error — enum class types don't implicitly convert to int, so Color and Fruit can't be compared directly", "Undefined behavior", "Always evaluates to false silently"], correct:1, exp:"Scoped enums (enum class) have NO implicit conversion to int (or to each other) — comparing two different enum class types directly is a compile error, exactly the type-safety feature enum class is designed to provide over plain enum."},
{cat:"Enums & Structs", type:"Output", q:"What does this print?", code:"struct Point { int x = 1; int y = 2; int z = 3; };\nint main() {\n    Point p{10, 20};  // aggregate init, only 2 values given\n    cout << p.x << \" \" << p.y << \" \" << p.z;\n}", options:["10 20 3", "10 20 0", "1 2 3", "Compile error"], correct:0, exp:"Aggregate initialization fills in members in order: x=10, y=20. z has no explicit initializer supplied, so it falls back to its DEFAULT MEMBER INITIALIZER (=3), not zero. Output: '10 20 3'."},
{cat:"Enums & Structs", type:"Bug", q:"Why won't this aggregate-initialize?", code:"struct Point {\n    int x, y;\n    Point(int a, int b) : x(a), y(b) {}  // user-defined constructor\n};\nint main() {\n    Point p{1, 2};  // attempting aggregate init\n}", options:["Works fine, aggregate init as usual", "This actually works, but NOT as aggregate-init — it calls the user-defined constructor instead (which happens to look similar), since a type with ANY user-declared constructor is no longer an aggregate", "Compile error, always", "Undefined behavior"], correct:1, exp:"Since Point now has a user-declared constructor, it no longer QUALIFIES as an aggregate (aggregates must have no user-provided constructors) — but `Point p{1,2};` still compiles fine here, just because it now matches the explicit Point(int,int) CONSTRUCTOR via brace-init, not because of aggregate rules. Behaviorally similar output, but a fundamentally different initialization mechanism — a subtle distinction that matters if e.g. default member initializers or partial initialization were involved."},
// ===== Lambdas =====
{cat:"Lambdas", type:"Output", q:"What does this print?", code:"int x = 10;\nauto lambda = [x]() { return x * 2; };  // capture by value\nx = 100;  // modify AFTER lambda creation\ncout << lambda();", options:["200", "20", "Compile error", "100"], correct:1, exp:"Capture-by-value ([x]) copies x's value AT THE TIME the lambda is CREATED (10) — subsequent changes to the original x (to 100) are NOT reflected inside the lambda. lambda() returns 10*2=20."},
{cat:"Lambdas", type:"Output", q:"What does this print (capture by reference)?", code:"int x = 10;\nauto lambda = [&x]() { return x * 2; };  // capture by REFERENCE\nx = 100;\ncout << lambda();", options:["20", "200", "Compile error", "100"], correct:1, exp:"Capture-by-reference ([&x]) makes the lambda see the LIVE, current value of x — since x was changed to 100 before lambda() is called, it returns 100*2=200."},
{cat:"Lambdas", type:"Bug", q:"What's wrong with this lambda?", code:"int x = 10;\nauto lambda = [x]() {\n    x++;  // attempting to modify a captured-by-value variable\n    return x;\n};", options:["Compiles fine, x increments each call", "Compile error — by-value captures are const by default inside the lambda body; need 'mutable' to modify the internal copy", "Undefined behavior", "Only a warning"], correct:1, exp:"By default, a lambda's operator() is const, meaning by-value-captured variables can't be modified inside the lambda body — compile error. Fix: mark the lambda `mutable`: `[x]() mutable { x++; return x; }` (this still only affects the lambda's OWN internal copy, not the original x)."},
{cat:"Lambdas", type:"UB?", q:"Is calling storedLambda() later safe?", code:"std::function<int()> makeLambda() {\n    int local = 42;\n    return [&local]() { return local; };  // captures a LOCAL by reference\n}\nint main() {\n    auto storedLambda = makeLambda();\n    cout << storedLambda();  // called AFTER makeLambda() has returned\n}", options:["Safe, prints 42", "Undefined behavior — 'local' is destroyed when makeLambda() returns, leaving the lambda's captured reference dangling", "Compile error", "Prints 0"], correct:1, exp:"The lambda captures 'local' BY REFERENCE, but 'local' is a stack variable destroyed when makeLambda() returns. Calling storedLambda() afterward uses a dangling reference — undefined behavior. This is exactly why capture-by-value is safer for lambdas that outlive their creating scope."},
// ===== Object Slicing / dynamic_cast (extra) =====
{cat:"Object Slicing", type:"Output", q:"What does this print?", code:"class Base {\npublic:\n    virtual void print() const { cout << \"Base\"; }\n};\nclass Derived : public Base {\n    int extra = 99;\npublic:\n    void print() const override { cout << \"Derived(\" << extra << \")\"; }\n};\nvoid show(Base b) { b.print(); }  // by value!\nint main() {\n    Derived d;\n    show(d);\n}", options:["Derived(99)", "Base", "Compile error", "Undefined behavior"], correct:1, exp:"show() takes Base BY VALUE — passing d slices it down to just the Base portion (extra is lost). b.print() calls Base::print(), printing 'Base', NOT the Derived behavior the caller might expect."},
{cat:"Object Slicing", type:"Bug", q:"What's the bug in this container usage?", code:"class Shape { public: virtual double area() const { return 0; } };\nclass Circle : public Shape {\n    double r = 5;\npublic:\n    double area() const override { return 3.14 * r * r; }\n};\nint main() {\n    std::vector<Shape> shapes;  // vector of Shape BY VALUE\n    shapes.push_back(Circle());\n    cout << shapes[0].area();\n}", options:["Prints 78.5 (circle's area)", "Prints 0 — the Circle was sliced to a plain Shape when inserted into the vector", "Compile error", "Undefined behavior"], correct:1, exp:"std::vector<Shape> stores Shape objects BY VALUE — inserting a Circle slices it down to just its Shape portion. shapes[0] is now a genuine Shape (not a Circle), so area() returns 0 (Shape's base implementation), not the circle's actual area. Fix: use std::vector<std::unique_ptr<Shape>> or similar to preserve polymorphism."},
